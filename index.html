<!DOCTYPE html>
<html>
<head>
  <title>My Fitness App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0f172a;
      color: white;
    }
    header {
      background: #020617;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      color: #38bdf8;
    }
    .container {
      padding: 15px;
    }
    .card {
      background: #1e293b;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 12px;
    }
    h2 {
      color: #22c55e;
    }
    button {
      padding: 10px;
      margin-top: 8px;
      background: #22c55e;
      border: none;
      color: white;
      border-radius: 6px;
      width: 100%;
    }
    select, input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 5px;
      border: none;
    }
    .done {
      background: #16a34a !important;
    }
  </style>
</head>

<body>

<header>💪 My Fitness Comeback</header>

<div class="container">

  <!-- DAY SELECTOR -->
  <div class="card">
    <h2>📅 Select Workout Day</h2>
    <select id="daySelect" onchange="loadWorkout()">
      <option value="push1">Day 1 - Push</option>
      <option value="pull1">Day 2 - Pull</option>
      <option value="legs1">Day 3 - Legs</option>
      <option value="push2">Day 4 - Push</option>
      <option value="pull2">Day 5 - Pull</option>
      <option value="legs2">Day 6 - Legs</option>
    </select>
  </div>

  <!-- WORKOUT DISPLAY -->
  <div class="card">
    <h2>🏋️ Workout</h2>
    <ul id="workoutList"></ul>
    <button onclick="markDone()">✅ Mark Workout Done</button>
  </div>

  <!-- VIDEOS -->
  <div class="card">
    <h2>🎥 Exercise Videos</h2>
    <button onclick="openVideo('https://www.youtube.com/watch?v=IODxDxX7oi4')">Push-ups</button>
    <button onclick="openVideo('https://www.youtube.com/watch?v=CAwf7n6Luuc')">Lat Pulldown</button>
    <button onclick="openVideo('https://www.youtube.com/watch?v=aclHkVaku9U')">Squats</button>
    <button onclick="openVideo('https://www.youtube.com/watch?v=JB2oyawG9KI')">Leg Raises</button>
  </div>

  <!-- PROGRESS -->
  <div class="card">
    <h2>📊 Progress</h2>
    Weight:
    <input type="number" id="weight">
    <button onclick="saveWeight()">Save Weight</button>
    <p id="streak">🔥 Streak: 0 days</p>
  </div>

</div>

<script>

const workouts = {
  push1: ["Push-ups", "Bench Press", "Shoulder Press", "Lateral Raises", "Triceps", "Core"],
  pull1: ["Lat Pulldown", "Seated Row", "Face Pull", "Biceps", "Core"],
  legs1: ["Squats", "Leg Press", "Lunges", "Calf Raises"],
  push2: ["Incline Press", "Push-ups", "Shoulder Press", "Core"],
  pull2: ["Lat Pulldown", "Row", "Biceps", "Core"],
  legs2: ["Goblet Squat", "Step-ups", "Hamstring Curl", "Core"]
};

function loadWorkout() {
  let day = document.getElementById("daySelect").value;
  let list = workouts[day];
  let html = "";
  list.forEach(item => {
    html += "<li>" + item + "</li>";
  });
  document.getElementById("workoutList").innerHTML = html;
}

function markDone() {
  let streak = localStorage.getItem("streak") || 0;
  streak++;
  localStorage.setItem("streak", streak);
  document.getElementById("streak").innerText = "🔥 Streak: " + streak + " days";
  alert("Great job! Workout completed 💪");
}

function saveWeight() {
  let weight = document.getElementById("weight").value;
  localStorage.setItem("weight", weight);
  alert("Weight saved!");
}

function openVideo(link) {
  window.open(link, "_blank");
}

window.onload = function () {
  loadWorkout();
  let streak = localStorage.getItem("streak") || 0;
  document.getElementById("streak").innerText = "🔥 Streak: " + streak + " days";

  let weight = localStorage.getItem("weight");
  if (weight) document.getElementById("weight").value = weight;
};

</script>

</body>
</html>
