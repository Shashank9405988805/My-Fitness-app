<!DOCTYPE html>
<html>
<head>
  <title>My Fitness App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
    }

    header {
      text-align: center;
      padding: 18px;
      font-size: 22px;
      font-weight: bold;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
    }

    .container {
      padding: 15px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    h2 {
      margin-top: 0;
      color: #38bdf8;
    }

    select, button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-top: 8px;
    }

    button {
      background: linear-gradient(90deg, #22c55e, #4ade80);
      font-weight: bold;
      cursor: pointer;
    }

    ul {
      padding-left: 15px;
    }

    li {
      margin: 8px 0;
      padding: 8px;
      border-radius: 8px;
      transition: 0.2s;
    }

    li:hover {
      background: rgba(255,255,255,0.1);
    }

    .highlight {
      background: rgba(34,197,94,0.3);
    }

    iframe {
      width: 100%;
      height: 220px;
      border-radius: 12px;
      border: none;
    }

    .progress-bar {
      height: 10px;
      background: #1e293b;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 10px;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #22c55e, #4ade80);
      transition: width 0.3s;
    }

    .tag {
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<header>💪 My Fitness Comeback</header>

<div class="container">

  <!-- AI -->
  <div class="card">
    <h2>🧠 AI Coach</h2>

    <div class="tag">Energy</div>
    <select id="energy">
      <option value="low">Low</option>
      <option value="medium" selected>Medium</option>
      <option value="high">High</option>
    </select>

    <div class="tag">Soreness</div>
    <select id="soreness">
      <option value="low">Low</option>
      <option value="medium" selected>Medium</option>
      <option value="high">High</option>
    </select>

    <button onclick="runAI()">⚡ Optimize Workout</button>

    <p id="aiSuggestion"></p>
  </div>

  <!-- DAY -->
  <div class="card">
    <h2>📅 Workout Day</h2>
    <select id="daySelect" onchange="loadWorkout()">
      <option value="push">Push</option>
      <option value="pull">Pull</option>
      <option value="legs">Legs</option>
    </select>
  </div>

  <!-- MAIN -->
  <div class="card">
    <h2>🏋️ Main Exercises</h2>
    <ul id="mainList"></ul>
  </div>

  <!-- OPTIONAL -->
  <div class="card">
    <h2>🔄 Choose Exercises</h2>
    <ul id="optionalList"></ul>

    <div class="progress-bar">
      <div class="progress" id="progressBar"></div>
    </div>
  </div>

  <button onclick="markDone()">✅ Workout Done</button>

  <!-- VIDEO -->
  <div class="card">
    <h2>🎥 Exercise Guide</h2>
    <iframe id="videoFrame"></iframe>
  </div>

  <!-- STREAK -->
  <div class="card">
    <h2>🔥 Streak</h2>
    <p id="streak">0 days</p>
  </div>

</div>

<script>

const workouts = {
  push: {
    main: ["Dumbbell Bench Press","Shoulder Press"],
    optional: ["Push-ups","Incline Dumbbell Press","Lateral Raises","Chest Fly","Tricep Pushdown","Overhead Tricep Extension"]
  },
  pull: {
    main: ["Lat Pulldown","Seated Row"],
    optional: ["Face Pull","Dumbbell Row","Bicep Curl","Hammer Curl","Reverse Fly","Shrugs"]
  },
  legs: {
    main: ["Squats","Leg Press"],
    optional: ["Lunges","Step-ups","Hamstring Curl","Leg Extension","Calf Raises"]
  }
};

function loadWorkout() {
  let day = document.getElementById("daySelect").value;

  document.getElementById("mainList").innerHTML =
    workouts[day].main.map(e => `<li onclick="openVideo('${e}')">${e}</li>`).join("");

  document.getElementById("optionalList").innerHTML =
    workouts[day].optional.map(e =>
      `<li onclick="toggleSelect(this,'${e}')">${e}</li>`
    ).join("");

  updateProgress();
}

function toggleSelect(el, name) {
  el.classList.toggle("highlight");
  openVideo(name);
  updateProgress();
}

function updateProgress() {
  let selected = document.querySelectorAll(".highlight").length;
  let percent = (selected / 4) * 100;
  document.getElementById("progressBar").style.width = percent + "%";
}

function runAI() {
  let energy = document.getElementById("energy").value;
  let soreness = document.getElementById("soreness").value;

  let intensity = 3;

  if (energy === "low") intensity--;
  if (energy === "high") intensity++;
  if (soreness === "high") intensity--;
  if (soreness === "low") intensity++;

  intensity = Math.max(2, Math.min(5, intensity));

  highlightExercises(intensity);

  document.getElementById("aiSuggestion").innerText =
    `Do ${intensity} exercises today`;
}

function highlightExercises(count) {
  let items = document.querySelectorAll("#optionalList li");

  items.forEach((item, index) => {
    item.classList.toggle("highlight", index < count);
  });
}

function openVideo(name) {
  const videos = {
    "Push-ups":"IODxDxX7oi4",
    "Dumbbell Bench Press":"VmB1G1K7v94",
    "Incline Dumbbell Press":"8iPEnn-ltC8",
    "Shoulder Press":"B-aVuyhvLHU",
    "Lateral Raises":"kDqklk1ZESo",
    "Tricep Pushdown":"2-LAMcpzODU",
    "Overhead Tricep Extension":"YbX7Wd8jQ-Q",

    "Lat Pulldown":"CAwf7n6Luuc",
    "Seated Row":"HJSVR_67OlM",
    "Face Pull":"eIq5CB9JfKE",
    "Dumbbell Row":"pYcpY20QaE8",
    "Bicep Curl":"ykJmrZ5v0Oo",
    "Hammer Curl":"zC3nLlEvin4",
    "Reverse Fly":"tJX8qD1pXgI",
    "Shrugs":"cJRVVxmytaM",

    "Squats":"aclHkVaku9U",
    "Leg Press":"IZxyjW7MPJQ",
    "Lunges":"QOVaHwm-Q6U",
    "Step-ups":"dQqApCGd5Ss",
    "Hamstring Curl":"1Tq3QdYUuHs",
    "Leg Extension":"YyvSfVjQeL0",
    "Calf Raises":"-M4-G8p8fmc"
  };

  if (videos[name]) {
    document.getElementById("videoFrame").src =
      "https://www.youtube.com/embed/" + videos[name];
  }
}

function markDone() {
  let streak = parseInt(localStorage.getItem("streak") || "0") + 1;
  localStorage.setItem("streak", streak);
  document.getElementById("streak").innerText = streak + " days";
}

window.onload = loadWorkout;

</script>

</body>
</html>
