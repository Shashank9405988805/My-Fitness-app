<!DOCTYPE html>
<html>
<head>
  <title>My Fitness App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0f172a;
      color: white;
    }
    header {
      background: #020617;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      color: #38bdf8;
    }
    .container {
      padding: 15px;
    }
    .card {
      background: #1e293b;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 12px;
    }
    h2 {
      color: #22c55e;
    }
    li {
      margin: 8px 0;
      cursor: pointer;
    }
    button {
      padding: 10px;
      margin-top: 10px;
      background: #22c55e;
      border: none;
      color: white;
      border-radius: 6px;
      width: 100%;
    }
    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 5px;
      border: none;
    }
  </style>
</head>

<body>

<header>💪 My Fitness Comeback</header>

<div class="container">

  <!-- DAY SELECT -->
  <div class="card">
    <h2>📅 Select Day</h2>
    <select id="daySelect" onchange="loadWorkout()">
      <option value="push1">Day 1 - Push</option>
      <option value="pull1">Day 2 - Pull</option>
      <option value="legs1">Day 3 - Legs</option>
      <option value="push2">Day 4 - Push</option>
      <option value="pull2">Day 5 - Pull</option>
      <option value="legs2">Day 6 - Legs</option>
    </select>
  </div>

  <!-- WARMUP -->
  <div class="card">
    <h2>🔥 Warm-up (Mandatory)</h2>
    <ul>
      <li onclick="openVideo('Treadmill Walk')">
        Treadmill Walk – 5 min (5 km/h, Incline 1%)
      </li>
      <li onclick="openVideo('Arm Circles')">Arm Circles – 20 reps</li>
      <li onclick="openVideo('Leg Swings')">Leg Swings – 15 each leg</li>
      <li onclick="openVideo('Bodyweight Squats')">Bodyweight Squats – 15 reps</li>
    </ul>
  </div>

  <!-- WORKOUT -->
  <div class="card">
    <h2>🏋️ Workout</h2>
    <ul id="workoutList"></ul>
    <button onclick="markDone()">✅ Mark Workout Done</button>
  </div>

  <!-- PROGRESS -->
  <div class="card">
    <h2>📊 Progress</h2>
    Weight:
    <input type="number" id="weight">
    <button onclick="saveWeight()">Save Weight</button>
    <p id="streak">🔥 Streak: 0 days</p>
  </div>

</div>

<script>

const workouts = {
  push1: ["Push-ups","Dumbbell Bench Press","Shoulder Press","Lateral Raises","Tricep Pushdown","Hanging Knee Raises","Cable Crunch","Plank"],
  pull1: ["Lat Pulldown","Seated Row","Face Pull","Bicep Curl","Russian Twists","Side Plank","Dead Bug"],
  legs1: ["Squats","Leg Press","Lunges","Calf Raises","Plank"],
  push2: ["Incline Dumbbell Press","Push-ups","Shoulder Press","Hanging Leg Raises","Bicycle Crunch","Plank"],
  pull2: ["Lat Pulldown","Seated Row","Bicep Curl","Cable Woodchopper","Reverse Crunch","Plank Shoulder Tap"],
  legs2: ["Goblet Squat","Step-ups","Hamstring Curl","Hollow Hold"]
};

function loadWorkout() {
  let day = document.getElementById("daySelect").value;
  let list = workouts[day];
  let html = "";
  list.forEach(item => {
    html += `<li onclick="openVideo('${item}')">${item}</li>`;
  });
  document.getElementById("workoutList").innerHTML = html;
}

function markDone() {
  let streak = localStorage.getItem("streak") || 0;
  streak++;
  localStorage.setItem("streak", streak);
  document.getElementById("streak").innerText = "🔥 Streak: " + streak + " days";
  alert("Workout completed 💪");
}

function saveWeight() {
  let weight = document.getElementById("weight").value;
  localStorage.setItem("weight", weight);
  alert("Weight saved!");
}

function openVideo(name) {
  const videos = {
    "Push-ups":"https://www.youtube.com/watch?v=IODxDxX7oi4",
    "Dumbbell Bench Press":"https://www.youtube.com/watch?v=VmB1G1K7v94",
    "Incline Dumbbell Press":"https://www.youtube.com/watch?v=8iPEnn-ltC8",
    "Shoulder Press":"https://www.youtube.com/watch?v=B-aVuyhvLHU",
    "Lateral Raises":"https://www.youtube.com/watch?v=kDqklk1ZESo",
    "Tricep Pushdown":"https://www.youtube.com/watch?v=2-LAMcpzODU",

    "Lat Pulldown":"https://www.youtube.com/watch?v=CAwf7n6Luuc",
    "Seated Row":"https://www.youtube.com/watch?v=HJSVR_67OlM",
    "Face Pull":"https://www.youtube.com/watch?v=eIq5CB9JfKE",
    "Bicep Curl":"https://www.youtube.com/watch?v=ykJmrZ5v0Oo",

    "Squats":"https://www.youtube.com/watch?v=aclHkVaku9U",
    "Leg Press":"https://www.youtube.com/watch?v=IZxyjW7MPJQ",
    "Lunges":"https://www.youtube.com/watch?v=QOVaHwm-Q6U",
    "Calf Raises":"https://www.youtube.com/watch?v=-M4-G8p8fmc",
    "Goblet Squat":"https://www.youtube.com/watch?v=6xwGFn-J_QE",
    "Step-ups":"https://www.youtube.com/watch?v=dQqApCGd5Ss",
    "Hamstring Curl":"https://www.youtube.com/watch?v=1Tq3QdYUuHs",

    "Hanging Knee Raises":"https://www.youtube.com/watch?v=JB2oyawG9KI",
    "Hanging Leg Raises":"https://www.youtube.com/watch?v=JB2oyawG9KI",
    "Cable Crunch":"https://www.youtube.com/watch?v=2fjej2KQUqQ",
    "Plank":"https://www.youtube.com/watch?v=pSHjTRCQxIw",
    "Russian Twists":"https://www.youtube.com/watch?v=wkD8rjkodUI",
    "Side Plank":"https://www.youtube.com/watch?v=K2VljzCC16g",
    "Dead Bug":"https://www.youtube.com/watch?v=4XLEnwUr3QE",
    "Bicycle Crunch":"https://www.youtube.com/watch?v=9FGilxCbdz8",
    "Cable Woodchopper":"https://www.youtube.com/watch?v=QSLZ8xZ3hXo",
    "Reverse Crunch":"https://www.youtube.com/watch?v=hyv14e2QDq0",
    "Plank Shoulder Tap":"https://www.youtube.com/watch?v=gWHQpMUdQ6U",
    "Hollow Hold":"https://www.youtube.com/watch?v=4xRpGgttca8",

    "Treadmill Walk":"https://www.youtube.com/watch?v=O8QmWb9G2GQ",
    "Arm Circles":"https://www.youtube.com/watch?v=140RTNMciH8",
    "Leg Swings":"https://www.youtube.com/watch?v=7R8wM3z4FvY",
    "Bodyweight Squats":"https://www.youtube.com/watch?v=aclHkVaku9U"
  };

  if (videos[name]) {
    window.open(videos[name], "_blank");
  } else {
    alert("Video not found!");
  }
}

window.onload = function() {
  loadWorkout();
  let streak = localStorage.getItem("streak") || 0;
  document.getElementById("streak").innerText = "🔥 Streak: " + streak + " days";

  let weight = localStorage.getItem("weight");
  if (weight) document.getElementById("weight").value = weight;
};

</script>

</body>
</html>
