<!DOCTYPE html>
<html>
<head>
  <title>My Fitness App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#0f172a; color:white; }
    header { text-align:center; padding:15px; background:#020617; font-size:20px; }
    .container { padding:15px; }

    .card {
      background:#1e293b;
      padding:15px;
      margin-bottom:15px;
      border-radius:10px;
    }

    select, button {
      width:100%;
      padding:10px;
      margin-top:8px;
      border:none;
      border-radius:6px;
    }

    button { background:#22c55e; color:white; }

    ul { padding-left:15px; }

    li {
      margin:8px 0;
      padding:6px;
      border-radius:6px;
    }

    .exercise {
      display:flex;
      justify-content:space-between;
      align-items:center;
      cursor:pointer;
    }

    .active { background:#22c55e; }

    .small-btn {
      width:auto;
      padding:4px 8px;
      font-size:12px;
      margin-left:10px;
      background:#3b82f6;
    }

    iframe {
      width:100%;
      height:220px;
      border:none;
      border-radius:10px;
    }

    .bar {
      height:10px;
      background:#334155;
      border-radius:10px;
      margin-top:10px;
    }

    .progress {
      height:100%;
      width:0%;
      background:#22c55e;
      border-radius:10px;
    }
  </style>
</head>

<body>

<header>💪 My Fitness App</header>

<div class="container">

<!-- AI -->
<div class="card">
  <h3>🧠 AI Coach</h3>
  <select id="energy">
    <option value="low">Low</option>
    <option value="medium" selected>Medium</option>
    <option value="high">High</option>
  </select>

  <select id="soreness">
    <option value="low">Low</option>
    <option value="medium" selected>Medium</option>
    <option value="high">High</option>
  </select>

  <button onclick="runAI()">Suggest</button>
  <p id="ai"></p>
</div>

<!-- WORKOUT -->
<div class="card">
  <h3>🏋️ Workout</h3>

  <select id="day" onchange="loadWorkout()">
    <option value="push">Push</option>
    <option value="pull">Pull</option>
    <option value="legs">Legs</option>
  </select>

  <div id="list"></div>

  <div class="bar"><div class="progress" id="progress"></div></div>
</div>

<!-- FINISHER -->
<div class="card">
  <h3>⚡ Finisher</h3>

  <select id="finisherType" onchange="loadFinisher()">
    <option value="cardio">Cardio</option>
    <option value="core">Core</option>
  </select>

  <div id="finisherBox"></div>
</div>

<!-- VIDEO -->
<div class="card">
  <h3>🎥 Exercise</h3>
  <iframe id="videoFrame"></iframe>
</div>

</div>

<script>

// DATA
const workouts = {
  push:{main:["Bench Press","Shoulder Press"], optional:["Incline Press","Lateral Raise","Chest Fly","Tricep Pushdown"]},
  pull:{main:["Lat Pulldown","Row"], optional:["Face Pull","Curl","Hammer Curl","Shrugs"]},
  legs:{main:["Squat","Leg Press"], optional:["Lunges","Leg Extension","Hamstring Curl","Calf Raise"]}
};

const core = ["Plank","Crunch","Bicycle","Russian Twist","Leg Raise","Cable Crunch","Hanging Knee Raise"];

// LOAD WORKOUT
function loadWorkout(){
  let d=document.getElementById("day").value;

  let html="<b>Main Exercises</b><ul>";
  workouts[d].main.forEach(e=> html+=exerciseHTML(e));

  html+="</ul><b>Optional</b><ul>";
  workouts[d].optional.forEach(e=> html+=exerciseHTML(e));

  html+="</ul>";

  document.getElementById("list").innerHTML=html;
}

// GENERATE EXERCISE
function exerciseHTML(name){
  return `
    <li class="exercise" onclick="handleClick(event,'${name}')">
      ${name}
      <button class="small-btn" onclick="searchVideo(event,'${name}')">▶</button>
    </li>
  `;
}

// CLICK HANDLER
function handleClick(event,name){
  playVideo(name);
  event.currentTarget.classList.toggle("active");
  updateProgress();
}

// SEARCH VIDEO
function searchVideo(event,name){
  event.stopPropagation();
  let query=encodeURIComponent(name+" exercise proper form");
  document.getElementById("videoFrame").src=
    "https://www.youtube.com/embed?listType=search&list="+query;
}

// PROGRESS
function updateProgress(){
  let c=document.querySelectorAll(".active").length;
  document.getElementById("progress").style.width=(c/6)*100+"%";
}

// AI
function runAI(){
  let e=energy.value, s=soreness.value;

  let exercises=3;
  let msg="Moderate";

  if(e=="high"&&s=="low"){exercises=5; msg="High intensity";}
  if(e=="low"){exercises=2; msg="Light";}
  if(s=="high"){exercises=2; msg="Recovery";}

  document.getElementById("ai").innerText=
    `${msg}: Do ${exercises} exercises`;
}

// FINISHER
function loadFinisher(){
  let type=document.getElementById("finisherType").value;

  if(type==="cardio"){
    document.getElementById("finisherBox").innerHTML=
      `<ul>${exerciseHTML("Walk")}${exerciseHTML("Cycling")}</ul>`;
  }else{
    document.getElementById("finisherBox").innerHTML=
      `<b>🔥 Core (Pick 2–3)</b>
       <ul>${core.map(e=>exerciseHTML(e)).join("")}</ul>`;
  }
}

// VIDEO SYSTEM
function playVideo(name){
  const v={
    "Bench Press":"VmB1G1K7v94",
    "Shoulder Press":"B-aVuyhvLHU",
    "Squat":"aclHkVaku9U",
    "Walk":"ml6cT4AZdqI",
    "Cycling":"Rk0XgH0YdZQ",
    "Plank":"pSHjTRCQxIw",
    "Crunch":"Xyd_fa5zoEU",
    "Bicycle":"9FGilxCbdz8",
    "Russian Twist":"wkD8rjkodUI",
    "Leg Raise":"JB2oyawG9KI",
    "Cable Crunch":"AV5PmZJIrrw"
  };

  if(v[name]){
    document.getElementById("videoFrame").src=
      "https://www.youtube.com/embed/"+v[name];
  }
}

// INIT
window.onload=function(){
  loadWorkout();
  loadFinisher();
};

</script>

</body>
</html>
