<!DOCTYPE html>
<html>
<head>
  <title>My Fitness App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#0f172a; color:white; }
    header { text-align:center; padding:15px; background:#020617; font-size:20px; }
    .container { padding:15px; }

    .card {
      background:#1e293b;
      padding:15px;
      margin-bottom:15px;
      border-radius:10px;
    }

    h3 { margin-bottom:10px; }

    select, button, input {
      width:100%;
      padding:10px;
      margin-top:8px;
      border:none;
      border-radius:6px;
    }

    button { background:#22c55e; color:white; }

    ul { padding-left:15px; margin-bottom:15px; }

    li {
      margin:8px 0;
      cursor:pointer;
      padding:6px;
      border-radius:6px;
    }

    .active { background:#22c55e; }

    iframe {
      width:100%;
      height:220px;
      border:none;
      border-radius:10px;
    }

    .bar {
      height:10px;
      background:#334155;
      border-radius:10px;
      margin-top:10px;
    }

    .progress {
      height:100%;
      width:0%;
      background:#22c55e;
      border-radius:10px;
    }
  </style>
</head>

<body>

<header>💪 My Fitness App</header>

<div class="container">

<!-- AI -->
<div class="card">
  <h3>🧠 AI Coach</h3>

  <select id="energy">
    <option value="low">Low</option>
    <option value="medium" selected>Medium</option>
    <option value="high">High</option>
  </select>

  <select id="soreness">
    <option value="low">Low</option>
    <option value="medium" selected>Medium</option>
    <option value="high">High</option>
  </select>

  <button onclick="runAI()">Suggest</button>
  <p id="ai"></p>
</div>

<!-- WARMUP -->
<div class="card">
  <h3>🔥 Warm-up</h3>
  <ul>
    <li onclick="playVideo('Walk')">Treadmill Walk (5–6 km/h, incline 2%, 5 min)</li>
    <li onclick="playVideo('Squat')">Bodyweight Squats</li>
    <li onclick="playVideo('Push-ups')">Push-ups</li>
  </ul>
</div>

<!-- WORKOUT -->
<div class="card">
  <h3>🏋️ Workout</h3>

  <select id="day" onchange="loadWorkout()">
    <option value="push">Push</option>
    <option value="pull">Pull</option>
    <option value="legs">Legs</option>
  </select>

  <div id="list"></div>

  <div class="bar"><div class="progress" id="progress"></div></div>
</div>

<!-- FINISHER -->
<div class="card">
  <h3>⚡ Finisher</h3>
  <div id="finisherBox"></div>
</div>

<!-- CALORIES -->
<div class="card">
  <h3>🔥 Calories</h3>
  <input id="weight" placeholder="Enter weight (kg)">
  <button onclick="calcCalories()">Calculate</button>
  <p id="caloriesResult"></p>
  <div id="history"></div>
</div>

<!-- VIDEO -->
<div class="card">
  <h3>🎥 Exercise</h3>
  <iframe id="videoFrame"></iframe>
</div>

</div>

<script>

// DATA
const workouts = {
  push:{main:["Bench Press","Shoulder Press"], optional:["Push-ups","Incline Press","Lateral Raise","Chest Fly","Tricep Pushdown"]},
  pull:{main:["Lat Pulldown","Row"], optional:["Face Pull","Curl","Hammer Curl","Shrugs","Reverse Fly"]},
  legs:{main:["Squat","Leg Press"], optional:["Lunges","Step-up","Leg Extension","Hamstring Curl","Calf Raise"]}
};

const core = ["Plank","Dead Bug","Crunch","Bicycle","Russian Twist","Leg Raise"];

// LOAD WORKOUT
function loadWorkout(){
  let d=document.getElementById("day").value;

  let html="<b>Main Exercises</b><ul>";
  workouts[d].main.forEach(e=>{
    html+=`<li onclick="select(this,'${e}')">${e}</li>`;
  });

  html+="</ul><b>Optional (Pick 2–3)</b><ul>";
  workouts[d].optional.forEach(e=>{
    html+=`<li onclick="select(this,'${e}')">${e}</li>`;
  });

  html+="</ul>";

  document.getElementById("list").innerHTML=html;
}

// SELECT
function select(el,name){
  el.classList.toggle("active");
  playVideo(name);
  updateProgress();
}

function updateProgress(){
  let c=document.querySelectorAll(".active").length;
  document.getElementById("progress").style.width=(c/6)*100+"%";
}

// AI FIXED
function runAI(){
  let e=energy.value, s=soreness.value;

  let exercises=3;
  let msg="Moderate";

  if(e=="high"&&s=="low"){exercises=5; msg="High intensity";}
  if(e=="low"){exercises=2; msg="Light workout";}
  if(s=="high"){exercises=2; msg="Recovery";}

  document.getElementById("ai").innerText=
    `${msg}: Do ${exercises} exercises + finisher`;
}

// FINISHER FIXED
function loadFinisher(){
  let c=parseInt(localStorage.getItem("count")||0);

  if(c%2==0){
    document.getElementById("finisherBox").innerHTML=
      "🏃 Cardio (Pick 1–2)<br>- Walk 6 km/h incline 3%<br>- Incline walk 6–8%<br>- Cycling 12–15 min";
  }else{
    document.getElementById("finisherBox").innerHTML=
      "<b>🔥 Core (Pick 2–3)</b><br>"+
      core.map(e=>`<div onclick="playVideo('${e}')">• ${e}</div>`).join("");
  }
}

// CALORIES FIXED
function calcCalories(){
  let w=document.getElementById("weight").value;
  if(!w) return;

  let cal=Math.round(5*w*0.25);
  document.getElementById("caloriesResult").innerText="🔥 "+cal+" kcal";

  let h=JSON.parse(localStorage.getItem("hist")||"[]");
  let d=new Date().toLocaleDateString();

  h.push(d+" - "+cal+" kcal");
  if(h.length>5) h.shift();

  localStorage.setItem("hist",JSON.stringify(h));
  document.getElementById("history").innerHTML=h.join("<br>");
}

// VIDEO FIXED
function playVideo(n){
  const v={
    "Push-ups":"IODxDxX7oi4",
    "Squat":"aclHkVaku9U",
    "Plank":"pSHjTRCQxIw",
    "Bench Press":"VmB1G1K7v94",
    "Shoulder Press":"B-aVuyhvLHU"
  };

  if(v[n]){
    document.getElementById("videoFrame").src="https://www.youtube.com/embed/"+v[n];
  }
}

// INIT
window.onload=function(){
  loadWorkout();
  loadFinisher();
};

</script>

</body>
</html>
