<script>

// ================= WORKOUT DATA =================
const workouts = {
  push: {
    main: ["Dumbbell Bench Press","Shoulder Press"],
    optional: ["Push-ups","Incline Dumbbell Press","Lateral Raises","Chest Fly","Tricep Pushdown","Overhead Tricep Extension"]
  },
  pull: {
    main: ["Lat Pulldown","Seated Row"],
    optional: ["Face Pull","Dumbbell Row","Bicep Curl","Hammer Curl","Reverse Fly","Shrugs"]
  },
  legs: {
    main: ["Squats","Leg Press"],
    optional: ["Lunges","Step-ups","Hamstring Curl","Leg Extension","Calf Raises"]
  }
};

// ================= FINISHER =================
function getFinisherType() {
  let count = parseInt(localStorage.getItem("workoutCount") || "0");
  return count % 2 === 0 ? "cardio" : "core";
}

const cardioPlan = [
  "Treadmill Walk – 6 km/h, incline 3%, 12 min",
  "Incline Walk – 5 km/h, incline 6–8%, 10 min",
  "Light Jog – 7–8 km/h, incline 1%, 8–10 min",
  "Cycling – resistance 5–7, 12–15 min"
];

const corePlan = {
  1: ["Plank – 20 sec x 3","Dead Bug – 10 reps","Cable Crunch – 12 reps","Bicycle Crunch – 15 reps"],
  2: ["Plank – 30 sec x 3","Hanging Knee Raises – 10 reps","Russian Twists – 20 reps","Cable Crunch – 15 reps"],
  3: ["Plank – 40 sec x 3","Hanging Leg Raises – 12 reps","Bicycle Crunch – 25 reps","Russian Twists – 25 reps"],
  4: ["Plank – 60 sec x 3","Hanging Leg Raises – 15 reps","Cable Crunch – 15 reps","Bicycle Crunch – 30 reps"]
};

// ================= LOAD WORKOUT =================
function loadWorkout() {
  let day = document.getElementById("daySelect").value;

  document.getElementById("mainList").innerHTML =
    workouts[day].main.map(e => `<li onclick="openVideo('${e}')">${e}</li>`).join("");

  document.getElementById("optionalList").innerHTML =
    workouts[day].optional.map(e =>
      `<li onclick="toggleSelect(this,'${e}')">${e}</li>`
    ).join("");

  updateProgress();
}

// ================= SELECT =================
function toggleSelect(el, name) {
  el.classList.toggle("highlight");
  openVideo(name);
  updateProgress();
}

function updateProgress() {
  let selected = document.querySelectorAll(".highlight").length;
  let percent = (selected / 6) * 100;
  document.getElementById("progressBar").style.width = percent + "%";
}

// ================= AI =================
function runAI() {
  let energy = document.getElementById("energy").value;
  let soreness = document.getElementById("soreness").value;

  let intensity = 3;

  if (energy === "low") intensity--;
  if (energy === "high") intensity++;
  if (soreness === "high") intensity--;
  if (soreness === "low") intensity++;

  intensity = Math.max(2, Math.min(5, intensity));

  highlightExercises(intensity);

  document.getElementById("aiSuggestion").innerText =
    `Do ${intensity} exercises + finisher`;
}

function highlightExercises(count) {
  let items = document.querySelectorAll("#optionalList li");

  items.forEach((item, index) => {
    item.classList.toggle("highlight", index < count);
  });
}

// ================= FINISHER LOAD =================
function getCurrentWeek() {
  let start = localStorage.getItem("startDate");

  if (!start) {
    start = new Date().toISOString();
    localStorage.setItem("startDate", start);
  }

  let diff = Math.floor((new Date() - new Date(start)) / (1000 * 60 * 60 * 24));
  return Math.floor(diff / 7) % 4 + 1;
}

function loadFinisher() {
  let type = getFinisherType();
  let week = getCurrentWeek();

  if (type === "cardio") {
    document.getElementById("finisherType").innerText =
      "🏃 Cardio Day (Pick 1–2)";

    document.getElementById("finisherList").innerHTML =
      cardioPlan.map(e => `<li>${e}</li>`).join("");

  } else {
    document.getElementById("finisherType").innerText =
      "🔥 Core Day (Pick 2–3)";

    document.getElementById("finisherList").innerHTML =
      corePlan[week].map(e =>
        `<li onclick="openVideo('${e.split(' – ')[0]}')">${e}</li>`
      ).join("");
  }
}

// ================= CALORIES =================
function calculateCalories() {
  let weight = parseFloat(document.getElementById("weight").value);

  if (!weight) {
    alert("Enter weight");
    return;
  }

  let type = getFinisherType();
  let calories = 0;

  if (type === "cardio") {
    calories = 5 * weight * 0.25;
  } else {
    calories = 4 * weight * 0.2;
  }

  calories = Math.round(calories);

  document.getElementById("caloriesResult").innerText =
    "🔥 Burned: " + calories + " kcal";

  let history = JSON.parse(localStorage.getItem("calorieHistory") || "[]");
  let today = new Date().toLocaleDateString();

  history.push({ date: today, calories });

  if (history.length > 7) history.shift();

  localStorage.setItem("calorieHistory", JSON.stringify(history));

  loadChart();
}

// ================= GRAPH =================
let chart;

function loadChart() {
  let history = JSON.parse(localStorage.getItem("calorieHistory") || "[]");

  let labels = history.map(e => e.date);
  let data = history.map(e => e.calories);

  let ctx = document.getElementById("calorieChart").getContext("2d");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: "Calories Burned",
        data: data,
        tension: 0.3
      }]
    },
    options: {
      plugins: {
        legend: { labels: { color: "white" } }
      },
      scales: {
        x: { ticks: { color: "white" } },
        y: { ticks: { color: "white" } }
      }
    }
  });
}

// ================= DONE =================
function markDone() {
  let streak = parseInt(localStorage.getItem("streak") || "0") + 1;
  let count = parseInt(localStorage.getItem("workoutCount") || "0") + 1;

  localStorage.setItem("streak", streak);
  localStorage.setItem("workoutCount", count);

  document.getElementById("streak").innerText = streak + " days";
}

// ================= INIT =================
window.onload = function() {
  loadWorkout();
  loadFinisher();
  loadChart();
};

</script>
