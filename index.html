<!DOCTYPE html>
<html>
<head>
  <title>Fitness App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      text-align: center;
      padding: 15px;
      font-size: 20px;
      background: #020617;
    }

    .container { padding: 15px; }

    .card {
      background: #1e293b;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }

    h2 { margin-top: 0; }

    select, button, input {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #22c55e;
      color: white;
    }

    li {
      margin: 6px 0;
      cursor: pointer;
    }

    iframe {
      width: 100%;
      height: 200px;
      border: none;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>💪 Fitness Tracker</header>

<div class="container">

  <!-- AI -->
  <div class="card">
    <h2>🧠 AI Coach</h2>

    <select id="energy">
      <option value="low">Low Energy</option>
      <option value="medium" selected>Medium</option>
      <option value="high">High</option>
    </select>

    <select id="soreness">
      <option value="low">Low Soreness</option>
      <option value="medium" selected>Medium</option>
      <option value="high">High</option>
    </select>

    <button onclick="runAI()">Get Suggestion</button>
    <p id="ai"></p>
  </div>

  <!-- DAY -->
  <div class="card">
    <h2>Workout</h2>
    <select id="day" onchange="loadWorkout()">
      <option value="push">Push</option>
      <option value="pull">Pull</option>
      <option value="legs">Legs</option>
    </select>

    <ul id="list"></ul>
  </div>

  <!-- FINISHER -->
  <div class="card">
    <h2>⚡ Finisher</h2>
    <p id="finisher"></p>
  </div>

  <!-- CALORIES -->
  <div class="card">
    <h2>🔥 Calories</h2>
    <input id="weight" placeholder="Enter weight (kg)">
    <button onclick="calc()">Calculate</button>
    <p id="cal"></p>
  </div>

  <!-- VIDEO -->
  <div class="card">
    <h2>🎥 Exercise</h2>
    <iframe id="video"></iframe>
  </div>

</div>

<script>

// workouts
const workouts = {
  push: ["Push-ups","Bench Press","Shoulder Press"],
  pull: ["Pull-ups","Row","Bicep Curl"],
  legs: ["Squats","Lunges","Leg Press"]
};

// load workout
function loadWorkout() {
  let day = document.getElementById("day").value;

  document.getElementById("list").innerHTML =
    workouts[day].map(e =>
      `<li onclick="video('${e}')">${e}</li>`
    ).join("");
}

// AI
function runAI() {
  let e = energy.value;
  let s = soreness.value;

  let msg = "Do moderate workout";

  if (e === "high" && s === "low") msg = "Go intense 💪";
  if (e === "low") msg = "Keep it light";
  if (s === "high") msg = "Recovery workout";

  document.getElementById("ai").innerText = msg;
}

// finisher
function finisher() {
  let count = localStorage.getItem("count") || 0;

  if (count % 2 == 0) {
    document.getElementById("finisher").innerText =
      "Cardio: Walk 10 min (5-6 km/h, incline 3%)";
  } else {
    document.getElementById("finisher").innerText =
      "Core: Plank 30 sec + Crunches";
  }
}

// calories
function calc() {
  let w = weight.value;

  if (!w) return;

  let cal = Math.round(5 * w * 0.25);

  document.getElementById("cal").innerText =
    "Burned ~ " + cal + " kcal";
}

// video
function video(name) {
  const vids = {
    "Push-ups":"IODxDxX7oi4",
    "Squats":"aclHkVaku9U",
    "Plank":"pSHjTRCQxIw"
  };

  if (vids[name]) {
    document.getElementById("video").src =
      "https://www.youtube.com/embed/" + vids[name];
  }
}

// done
function done() {
  let c = localStorage.getItem("count") || 0;
  localStorage.setItem("count", ++c);
}

// init
window.onload = function() {
  loadWorkout();
  finisher();
};

</script>

</body>
</html>
